<!DOCTYPE html>
<html lang="bn">
<head>
    <link rel="icon" href="https://i.postimg.cc/cCKd21YV/FB-IMG-1751915283498-prev-ui.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfume Heaven - Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS - অপরিবর্তিত রাখা হয়েছে -->
    <style>
        :root { --primary: #0f4c3a; --accent: #e94560; --bg: #f6f9fc; --card: #ffffff; --text: #2b3445; --border: #e3e9ef; --header-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: rgba(255, 255, 255, 0.95); height: var(--header-h); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); }
        .logo img { height: 45px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .product-card { background: #fff; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .image-box { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .image-box img { max-width: 100%; }
        #app-iframe-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 3000; display: none; }
        #app-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="logo"><img src="https://i.postimg.cc/cCKd21YV/FB-IMG-1751915283498-prev-ui.png" alt="Logo"></div>
    </header>

    <!-- Product Grid -->
    <div class="product-grid" id="product-grid"></div>

    <!-- Iframe Modal (ডাইনামিক লোড হবে) -->
    <div id="app-iframe-modal">
        <div style="padding: 10px; cursor:pointer;" onclick="closeIframe()">← Back</div>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb8YsPMOY53GxiycCL6G0MPZdgWe3nnyY",
            databaseURL: "https://movie-92659-default-rtdb.firebaseio.com",
            projectId: "movie-92659",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // প্রোডাক্ট ওপেন করার ফাংশন
        window.openProduct = (id) => {
            const modal = document.getElementById('app-iframe-modal');
            const frame = document.getElementById('app-frame');
            frame.src = `product_view.html?id=${id}`;
            modal.style.display = 'block';
            
            // ইউআরএল আপডেট করা যাতে ফেসবুকে আলাদা লিংক হিসেবে কাজ করে
            const newUrl = window.location.origin + window.location.pathname + '?id=' + id;
            window.history.pushState({ path: newUrl }, '', newUrl);
        };

        window.closeIframe = () => {
            document.getElementById('app-iframe-modal').style.display = 'none';
            window.history.pushState({}, '', window.location.pathname);
        };

        // ডাটাবেস থেকে প্রোডাক্ট লোড
        onValue(ref(db, 'products'), snap => {
            if(snap.exists()) {
                const products = Object.entries(snap.val()).map(([id, data]) => ({ id, ...data }));
                render(products);
                
                // ইউআরএল এ আইডি থাকলে অটোমেটিক ওপেন হবে
                const urlParams = new URLSearchParams(window.location.search);
                const idFromUrl = urlParams.get('id');
                if(idFromUrl) {
                    setTimeout(() => openProduct(idFromUrl), 1000);
                }
            }
        });

        function render(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="openProduct('${p.id}')">
                    <div class="image-box"><img src="${p.imageUrl}" loading="lazy"></div>
                    <div style="padding:10px;">${p.title}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
