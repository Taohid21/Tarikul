<!DOCTYPE html>
<html lang="bn">
<head>
    <link rel="icon" href="https://i.postimg.cc/cCKd21YV/FB-IMG-1751915283498-prev-ui.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfume Heaven - Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f4c3a;
            --accent: #e94560;
            --bg: #f6f9fc;
            --card: #ffffff;
            --text: #2b3445;
            --border: #e3e9ef;
            --header-h: 70px;
        }

        /* Festive Themes */
        body.theme-ramadan { --primary: #4b0082; --bg: #f0f0ff; }
        body.theme-eid { --primary: #b22222; --bg: #fff5f5; }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }

        /* Skeleton Loader */
        @keyframes shine { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
        .skeleton { background: #eee; background-image: linear-gradient(90deg, #eee 0px, #f5f5f5 40px, #eee 80px); background-size: 600px 100%; animation: shine 1.5s infinite linear; border-radius: 10px; }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            height: var(--header-h); position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 1px solid var(--border);
        }
        .header-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); position: relative;}
        .logo img { height: 45px; }

        /* Drawer Menu */
        #drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
        #drawer { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #fff; z-index: 2001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        #drawer.active { left: 0; }
        .drawer-header { padding: 30px 20px; background: var(--primary); color: #fff; }
        .drawer-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: 500; transition: 0.2s; text-decoration: none; color: inherit;}
        .drawer-item:hover { background: #f9f9f9; color: var(--primary); }

        /* Video Section */
        .section-title { padding: 20px 15px 10px; font-size: 18px; font-weight: 700; color: var(--primary); }
        .video-container { display: flex; gap: 12px; overflow-x: auto; padding: 0 15px 20px; scrollbar-width: none; }
        .video-container::-webkit-scrollbar { display: none; }
        .video-card { min-width: 135px; aspect-ratio: 9/16; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .video-card iframe { width: 100%; height: 100%; border: none; }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; margin-bottom: 100px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }

        .product-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: 0.3s; display: flex; flex-direction: column;}
        .image-box { width: 100%; aspect-ratio: 1/1; position: relative; background: #fff; padding: 10px; cursor: pointer; }
        .image-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .product-info { padding: 12px; flex-grow: 1;}
        .title { font-size: 14px; font-weight: 600; height: 38px; overflow: hidden; margin-bottom: 5px; color: var(--text); }
        .price { font-size: 16px; font-weight: 700; color: var(--primary); }
        .old-price { text-decoration: line-through; color: #999; font-size: 12px; margin-right: 5px; }
        
        /* Floating Add to Cart Button */
        .card-cart-btn { position: absolute; bottom: 10px; right: 10px; background: var(--primary); color: #fff; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s; }
        .card-cart-btn:active { transform: scale(0.9); }

        .badge { position: absolute; top: 10px; left: 10px; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; color: #fff; z-index: 2; }
        .badge-discount { background: var(--accent); }
        .badge-trending { background: #ff9800; left: auto; right: 10px; }

        /* Local Search Modal */
        #search-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2500; display: none; flex-direction: column; transform: translateY(100%); transition: 0.3s; }
        #search-modal.active { display: flex; transform: translateY(0); }
        .search-header { background: #fff; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .search-input { flex-grow: 1; border: none; background: #f0f2f5; padding: 12px 15px; border-radius: 30px; font-size: 14px; }

        /* Cart Modal (Step 1) */
        #cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2500; display: none; flex-direction: column; transform: translateY(100%); transition: 0.3s; }
        #cart-modal.active { display: flex; transform: translateY(0); }
        .modal-header { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #eee; }
        .cart-items-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; gap: 12px; margin-bottom: 15px; border-bottom: 1px dotted #ddd; padding-bottom: 15px; align-items: center; }
        .cart-footer { padding: 20px; border-top: 1px solid #eee; }

        /* Iframe Modal (Step 2 - Account/Checkout) */
        #app-iframe-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 3000; display: none; transform: translateX(100%); transition: 0.3s; }
        #app-iframe-modal.active { display: block; transform: translateX(0); }
        #app-frame { width: 100%; height: calc(100% - 65px); border: none; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1500; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #7d879c; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 3px; }

        .btn-main { background: var(--primary); color: #fff; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .cart-count-badge { position: absolute; top: -5px; right: -8px; background: var(--accent); color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 4000; display: none; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <!-- Drawer Menu -->
    <div id="drawer-overlay"></div>
    <div id="drawer">
        <div class="drawer-header">
            <h2 style="font-size: 20px;">Perfume Heaven</h2>
            <p style="font-size: 12px; opacity: 0.8;">Premium Fragrance Store</p>
        </div>
        <div class="drawer-item" onclick="location.reload()">🏠 Home</div>
        <div class="drawer-item" onclick="openIframe('orders.html', 'My Orders')">📦 My Orders</div>
        <div class="drawer-item" onclick="openIframe('account.html', 'My Account')">👤 My Account</div>
        <div class="drawer-item" onclick="openIframe('contact.html', 'Contact Us')">📞 Contact Us</div>
    </div>

    <!-- Local Search Modal -->
    <div id="search-modal">
        <div class="search-header">
            <svg onclick="history.back()" style="width:24px; cursor:pointer;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            <input type="text" id="search-input-field" class="search-input" placeholder="আতর বা পারফিউম খুঁজুন...">
        </div>
        <div class="product-grid" id="search-results-grid"></div>
    </div>

    <!-- Cart Modal (Items Preview) -->
    <div id="cart-modal">
        <div class="modal-header">
            <span style="font-weight:700;">Shopping Bag</span>
            <div onclick="history.back()" style="cursor:pointer;"><svg style="width:28px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></div>
        </div>
        <div class="cart-items-list" id="cart-items-list"></div>
        <div class="cart-footer">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:700; font-size:18px;">
                <span>Total:</span><span id="cart-grand-total">৳ 0</span>
            </div>
            <button class="btn-main" onclick="openIframe('checkout.html', 'Secure Checkout')">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Dynamic Iframe Modal -->
    <div id="app-iframe-modal">
        <div class="modal-header">
            <div onclick="history.back()" style="cursor:pointer;"><svg style="width:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg></div>
            <span id="iframe-title" style="font-weight:700;">Perfume Heaven</span>
            <div style="width:24px;"></div>
        </div>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-btn" id="menu-btn"><svg style="width:26px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></div>
        <div class="logo"><img src="https://i.postimg.cc/cCKd21YV/FB-IMG-1751915283498-prev-ui.png"></div>
        <div class="header-btn" onclick="openCart()"><svg style="width:26px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><span class="cart-count-badge cart-total-qty">0</span></div>
    </header>

    <!-- Marketing Section -->
    <div class="section-title">🔥 Exclusive Clips</div>
    <div class="video-container">
        <div class="video-card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&mute=1"></iframe></div>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&mute=1"></iframe></div>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&mute=1"></iframe></div>
    </div>

    <!-- Products Section -->
    <div class="section-title">✨ Premium Collection</div>
    <div class="product-grid" id="product-grid">
        <!-- Initial Skeleton Loaders -->
        <div class="product-card"><div class="skeleton" style="height:170px;"></div><div class="skeleton" style="height:20px; margin:10px;"></div></div>
        <div class="product-card"><div class="skeleton" style="height:170px;"></div><div class="skeleton" style="height:20px; margin:10px;"></div></div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Home</div>
        <div class="nav-item" onclick="openSearch()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>Search</div>
        <div class="nav-item" onclick="openCart()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>Cart</div>
        <div class="nav-item" onclick="openIframe('account.html', 'My Account')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb8YsPMOY53GxiycCL6G0MPZdgWe3nnyY",
            authDomain: "movie-92659.firebaseapp.com",
            databaseURL: "https://movie-92659-default-rtdb.firebaseio.com",
            projectId: "movie-92659",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allProducts = [];
        let adminControls = {};

        // --- Fetch Firebase Data ---
        onValue(ref(db, 'admin_controls'), snap => { if(snap.exists()) adminControls = snap.val(); renderProducts(allProducts, 'product-grid'); });
        onValue(ref(db, 'products'), snap => {
            if(snap.exists()) {
                allProducts = Object.entries(snap.val()).map(([id, data]) => ({ id, ...data }));
                setTimeout(() => renderProducts(allProducts, 'product-grid'), 800);
            }
        });

        // --- Render Logic ---
        function renderProducts(products, targetId) {
            const grid = document.getElementById(targetId);
            grid.innerHTML = '';
            products.forEach(p => {
                const rule = adminControls.product_rules?.[p.id];
                let originalPrice = p.price || (p.variants ? Object.values(p.variants)[0].price : 0);
                let finalPrice = originalPrice;
                let badges = '';

                if(rule) {
                    if(rule.percent > 0) {
                        finalPrice = originalPrice - (originalPrice * rule.percent / 100);
                        badges += `<div class="badge badge-discount">-${rule.percent}%</div>`;
                    }
                    if(rule.free_shipping) badges += `<div class="badge badge-trending" style="background:#10b981; left:10px; right:auto; top:40px;">Free Del.</div>`;
                }

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="image-box" onclick="openIframe('product_view.html?id=${p.id}', 'Product Details')">
                        ${badges}
                        <img src="${p.imageUrl}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <div class="title">${p.title}</div>
                        <div class="price">
                            ${finalPrice < originalPrice ? `<span class="old-price">৳${originalPrice}</span>` : ''}
                            ৳${Math.round(finalPrice)}
                        </div>
                    </div>
                    <div class="card-cart-btn" onclick="addToCart('${p.id}', '${p.title}', '${p.imageUrl}', ${finalPrice})">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Local Navigation Logic ---
        window.openIframe = (url, title) => {
            document.getElementById('iframe-title').textContent = title;
            document.getElementById('app-frame').src = url;
            const modal = document.getElementById('app-iframe-modal');
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
            history.pushState({ modal: 'iframe' }, '');
        };

        window.openSearch = () => {
            const modal = document.getElementById('search-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            document.getElementById('search-input-field').focus();
            history.pushState({ modal: 'search' }, '');
        };

        window.openCart = () => {
            updateCartUI();
            const modal = document.getElementById('cart-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            history.pushState({ modal: 'cart' }, '');
        };

        window.closeAll = () => {
            document.querySelectorAll('#search-modal, #cart-modal, #app-iframe-modal').forEach(m => {
                m.classList.remove('active');
                setTimeout(() => m.style.display = 'none', 300);
            });
            document.getElementById('drawer').classList.remove('active');
            document.getElementById('drawer-overlay').style.display = 'none';
            document.body.classList.remove('modal-open');
        };

        window.onpopstate = () => closeAll();

        // --- Search Logic ---
        document.getElementById('search-input-field').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.title.toLowerCase().includes(query));
            renderProducts(filtered, 'search-results-grid');
        });

        // --- Cart Operations ---
        window.addToCart = (id, title, img, price) => {
            let cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            const exists = cart.find(i => i.id === id);
            if(exists) exists.quantity++;
            else cart.push({ id, title, imageUrl: img, price, quantity: 1 });
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            updateCartUI();
            showToast("ব্যাগ এ যুক্ত হয়েছে!");
        };

        function updateCartUI() {
            const cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            const list = document.getElementById('cart-items-list');
            const badges = document.querySelectorAll('.cart-total-qty');
            let totalQty = cart.reduce((s, i) => s + i.quantity, 0);
            let totalAmt = 0;

            badges.forEach(b => b.textContent = totalQty);
            if(cart.length === 0) {
                list.innerHTML = `<p style="text-align:center; padding:50px; opacity:0.5;">ব্যাগ খালি</p>`;
                document.getElementById('cart-grand-total').textContent = '৳ 0';
                return;
            }

            list.innerHTML = '';
            cart.forEach(item => {
                totalAmt += item.price * item.quantity;
                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.imageUrl}" style="width:50px; height:50px; border-radius:8px;">
                        <div style="flex-grow:1;">
                            <div style="font-size:14px; font-weight:600;">${item.title}</div>
                            <div style="color:var(--primary); font-weight:700;">৳${item.price} x ${item.quantity}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-grand-total').textContent = `৳ ${totalAmt}`;
        }

        // Drawer
        document.getElementById('menu-btn').onclick = () => {
            document.getElementById('drawer').classList.add('active');
            document.getElementById('drawer-overlay').style.display = 'block';
            history.pushState({ drawer: true }, '');
        };
        document.getElementById('drawer-overlay').onclick = () => history.back();

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        };

        updateCartUI();
        window.updateCartUI = updateCartUI;
    </script>
</body>
</html>
