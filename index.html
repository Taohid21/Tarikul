        </div>
        <div class="logo"><img src="https://i.postimg.cc/cCKd21YV/FB-IMG-1751915283498-prev-ui.png" alt="Logo"></div>
        <div class="header-btn" onclick="openCart()">
            <svg style="width:22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span class="cart-count-badge cart-total-qty">0</span>
        </div>
    </header>

    <!-- Autogenerated Campaign Hero Slider -->
    <div class="slider-container" id="slider-container">
        <div class="slider-wrapper" id="slider-wrapper">
            <!-- Dynamic promotional slides will automatically inject here -->
            <div class="slide">
                <div class="skeleton" style="width: 100%; height: 100%;"></div>
            </div>
        </div>
        <div class="slider-dots" id="slider-dots"></div>
    </div>

    <!-- Brand Filter Row -->
    <div class="filter-section">
        <span class="section-tag">Collections</span>
        <!-- Brand Grid - Now ALL is structurally integrated at position index 0 inside same line -->
        <div class="brand-dropdown-grid" id="brand-grid">
            <div class="brand-box active-brand" id="btn-all" onclick="selectAll()">ALL</div>
            <div class="brand-box"><div class="skeleton" style="height:15px; width:60px;"></div></div>
            <div class="brand-box"><div class="skeleton" style="height:15px; width:70px;"></div></div>
        </div>
    </div>

    <!-- Product Grid System -->
    <div class="section-title">
        <span>THE SIGNATURE LINE</span>
    </div>
    <div class="product-grid" id="product-grid">
        <!-- Structural Fallback Skeletons -->
        <div class="product-card"><div class="skeleton" style="height:160px; margin: 8px;"></div><div class="skeleton" style="height:14px; margin:14px 14px 6px;"></div><div class="skeleton" style="height:25px; margin:0 14px 14px; width:60%;"></div></div>
        <div class="product-card"><div class="skeleton" style="height:160px; margin: 8px;"></div><div class="skeleton" style="height:14px; margin:14px 14px 6px;"></div><div class="skeleton" style="height:25px; margin:0 14px 14px; width:60%;"></div></div>
    </div>

    <!-- Standard Dock Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Home</div>
        <div class="nav-item" onclick="openSearch()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>Search</div>
        <div class="nav-item" onclick="openCart()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>Cart</div>
        <div class="nav-item" onclick="window.location.href='account.html'"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</div>
    </nav>

    <!-- Real-Time Core Scripting Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb8YsPMOY53GxiycCL6G0MPZdgWe3nnyY",
            authDomain: "movie-92659.firebaseapp.com",
            databaseURL: "https://movie-92659-default-rtdb.firebaseio.com",
            projectId: "movie-92659",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allProducts = [];
        let adminControls = {};
        let brandLogos = {};
        let currentSlide = 0;
        let sliderTimer = null;

        // Fetch Brand Logos System
        onValue(ref(db, 'brand_logos'), snap => {
            if(snap.exists()) brandLogos = snap.val();
            if(allProducts.length > 0) renderBrands();
        });

        // Fetch Administrative Control Systems
        onValue(ref(db, 'admin_controls'), snap => { 
            if(snap.exists()) adminControls = snap.val(); 
            if(allProducts.length > 0) {
                renderProducts(allProducts, 'product-grid');
                updatePromoSlider();
            }
        });

        // Fetch Dynamic Products Catalog
        onValue(ref(db, 'products'), snap => {
            if(snap.exists()) {
                allProducts = Object.entries(snap.val()).map(([id, data]) => ({ id, ...data }));
                renderBrands();
                setTimeout(() => {
                    renderProducts(allProducts, 'product-grid');
                    updatePromoSlider();
                }, 400);
            } else {
                document.getElementById('product-grid').innerHTML = '<p style="text-align:center; width:100%; grid-column: 1 / -1; padding: 40px; color: #888;">কোনো প্রোডাক্ট পাওয়া যায়নি</p>';
                document.getElementById('brand-grid').innerHTML = '<div class="brand-box active-brand" id="btn-all" onclick="selectAll()">ALL</div>';
            }
        });

        // Dynamic Promo Carousel Engine: Creates banners dynamically from products with discount/free-shipping
        function updatePromoSlider() {
            const wrapper = document.getElementById('slider-wrapper');
            const dotsContainer = document.getElementById('slider-dots');
            wrapper.innerHTML = '';
            dotsContainer.innerHTML = '';

            // Filter products with active discount or free shipping
            const promoProducts = allProducts.filter(p => {
                const rule = adminControls.product_rules?.[p.id];
                return rule && (rule.percent > 0 || rule.free_shipping);
            });

            if (promoProducts.length === 0) {
                // Default elegant fallback banner if no products are discounted
                wrapper.innerHTML = `
                    <div class="slide">
                        <div class="slide-content">
                            <span class="slide-tag">Curated Scent Collection</span>
                            <h3 class="slide-title">Luxury Signature Blends</h3>
                            <p class="slide-price">Discover Our Finest Fragrance Selection</p>
                        </div>
                        <div class="slide-image-box">
                            <img src="https://i.postimg.cc/cCKd21YV/FB-IMG-1751915283498-prev-ui.png" alt="Fallback Brand Image">
                        </div>
                    </div>`;
                return;
            }

            // Generate slides from discounted products
            promoProducts.forEach((p, index) => {
                let originalPrice = parseFloat(p.price);
                if (isNaN(originalPrice) && p.variants) {
                    originalPrice = parseFloat(Object.values(p.variants)[0].price);
                }
                if (isNaN(originalPrice)) originalPrice = 0;

                const rule = adminControls.product_rules[p.id];
                const finalPrice = rule.percent > 0 ? originalPrice - (originalPrice * rule.percent / 100) : originalPrice;
                
                const badgeText = rule.percent > 0 ? `${rule.percent}% OFF DEAL` : 'FREE SHIPPING OFFER';
                const safeImg = p.imageUrl || 'https://via.placeholder.com/150';

                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.innerHTML = `
                    <div class="slide-content" onclick="window.location.href='product_view.html?id=${p.id}'" style="cursor:pointer;">
                        <span class="slide-tag">${badgeText}</span>
                        <h3 class="slide-title">${p.title}</h3>
                        <p class="slide-price">৳${Math.round(finalPrice)} ${rule.percent > 0 ? `<span class="slide-old-price">৳${originalPrice}</span>` : ''}</p>
                    </div>
                    <div class="slide-image-box" onclick="window.location.href='product_view.html?id=${p.id}'" style="cursor:pointer;">
                        <img src="${safeImg}" alt="Promotional Image">
                    </div>
                `;
                wrapper.appendChild(slide);
            });

            // Set Slide Navigation Dots
            const slidesCount = promoProducts.length;
            if (slidesCount > 1) {
                for (let i = 0; i < slidesCount; i++) {
                    const dot = document.createElement('div');
                    dot.className = `dot ${i === 0 ? 'active' : ''}`;
                    dot.onclick = () => goToSlide(i);
                    dotsContainer.appendChild(dot);
                }
                
                // Clear existing timer if any
                if(sliderTimer) clearInterval(sliderTimer);
                sliderTimer = setInterval(() => {
                    currentSlide = (currentSlide + 1) % slidesCount;
                    goToSlide(currentSlide);
                }, 4000);
            }
        }

        function goToSlide(index) {
            currentSlide = index;
            document.getElementById('slider-wrapper').style.transform = `translateX(-${index * 100}%)`;
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === index);
            });
        }
        window.goToSlide = goToSlide;

        // Horizontal Brand Scroller System
        function renderBrands() {
            const brandGrid = document.getElementById('brand-grid');
            const uniqueBrands = [...new Set(allProducts.map(p => p.brand).filter(b => b && b.trim() !== ''))];
            
            // Re-render ALL as the structural index-0 pill
            let html = `<div class="brand-box active-brand" id="btn-all" onclick="selectAll()">ALL</div>`;
            uniqueBrands.forEach(brand => {
                const safeId = brand.replace(/\s+/g, '-');
                const firebaseSafeKey = brand.replace(/[.#$\[\]]/g, '').trim();
                const logoUrl = brandLogos[firebaseSafeKey] || "https://cdn-icons-png.flaticon.com/128/1162/1162263.png";

                html += `
                    <div class="brand-box brand-box-logo" id="brand-btn-${safeId}" onclick="selectBrand('${brand}')">
                        <img src="${logoUrl}" class="brand-icon" alt="Brand Logo">
                        ${brand}
                    </div>
                `;
            });
            brandGrid.innerHTML = html;
        }

        window.selectAll = () => {
            document.getElementById('btn-all').classList.add('active-brand');
            document.querySelectorAll('.brand-box:not(#btn-all)').forEach(el => el.classList.remove('active-brand'));
            renderProducts(allProducts, 'product-grid');
        };

        window.selectBrand = (brand) => {
            document.getElementById('btn-all').classList.remove('active-brand');
            document.querySelectorAll('.brand-box').forEach(el => el.classList.remove('active-brand'));
            
            const safeId = brand.replace(/\s+/g, '-');
            const activeBtn = document.getElementById(`brand-btn-${safeId}`);
            if(activeBtn) activeBtn.classList.add('active-brand');

            const filtered = allProducts.filter(p => p.brand === brand);
            renderProducts(filtered, 'product-grid');
        };

        // Render Structural Product Matrix
        function renderProducts(products, targetId) {
            const grid = document.getElementById(targetId);
            grid.innerHTML = '';
            
            if (products.length === 0) {
                grid.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1 / -1; padding: 40px; color: var(--text-muted); font-size:13px;">কোনো প্রোডাক্ট পাওয়া যায়নি</p>';
                return;
            }

            products.forEach(p => {
                let originalPrice = parseFloat(p.price);
                if (isNaN(originalPrice) && p.variants) {
                    originalPrice = parseFloat(Object.values(p.variants)[0].price);
                }
                if (isNaN(originalPrice)) originalPrice = 0; 

                let finalPrice = originalPrice;
                let badges = '';

                const rule = adminControls.product_rules?.[p.id];
                if(rule) {
                    if(rule.percent > 0) {
                        finalPrice = originalPrice - (originalPrice * rule.percent / 100);
                        badges += `<div class="badge badge-discount">-${rule.percent}%</div>`;
                    }
                    if(rule.free_shipping) badges += `<div class="badge badge-trending" style="top: ${rule.percent > 0 ? '40px' : '12px'};">Free</div>`;
                }

                const safeTitle = p.title ? p.title.replace(/'/g, "&apos;").replace(/"/g, "&quot;") : 'Unnamed Product';
                const safeImg = p.imageUrl || 'https://via.placeholder.com/150';
                const brandNameHtml = (p.brand && p.brand.trim() !== "") ? `<div class="brand-name">${p.brand}</div>` : '';

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="image-box" onclick="window.location.href='product_view.html?id=${p.id}'">
                        ${badges}
                        <img src="${safeImg}" loading="lazy" alt="Product Image">
                    </div>
                    <div class="product-info">
                        ${brandNameHtml}
                        <div class="title" onclick="window.location.href='product_view.html?id=${p.id}'">${safeTitle}</div>
                        <div class="price-wrapper">
                            ${finalPrice < originalPrice ? `<span class="old-price">৳${originalPrice}</span>` : ''}
                            <span class="price">৳${Math.round(finalPrice)}</span>
                        </div>
                    </div>
                    <div class="card-cart-btn" onclick="addToCart('${p.id}', '${safeTitle}', '${safeImg}', ${Math.round(finalPrice)})">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Drawer & Slider Actions ---
        window.openDrawer = () => {
            document.getElementById('drawer').classList.add('active');
            document.getElementById('drawer-overlay').classList.add('active');
            document.body.classList.add('modal-open');
        };

        window.closeDrawer = () => {
            document.getElementById('drawer').classList.remove('active');
            document.getElementById('drawer-overlay').classList.remove('active');
            document.body.classList.remove('modal-open');
        };

        window.openSearch = () => {
            const modal = document.getElementById('search-modal');
            modal.classList.add('active');
            document.getElementById('drawer-overlay').classList.add('active');
            document.getElementById('search-input-field').focus();
            history.pushState({ modal: 'search' }, '');
        };

        window.openCart = () => {
            updateCartUI();
            const modal = document.getElementById('cart-modal');
            modal.classList.add('active');
            document.getElementById('drawer-overlay').classList.add('active');
            history.pushState({ modal: 'cart' }, '');
        };

        window.closeAll = () => {
            document.getElementById('search-modal').classList.remove('active');
            document.getElementById('cart-modal').classList.remove('active');
            document.getElementById('drawer-overlay').classList.remove('active');
            document.body.classList.remove('modal-open');
            closeDrawer();
        };

        window.onpopstate = () => closeAll();

        // --- Live Search ---
        document.getElementById('search-input-field').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                (p.title && p.title.toLowerCase().includes(query)) || 
                (p.brand && p.brand.toLowerCase().includes(query))
            );
            renderProducts(filtered, 'search-results-grid');
        });

        // --- Global Shopping Cart System ---
        window.addToCart = (id, title, img, price) => {
            let cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            const exists = cart.find(i => i.id === id);
            const numPrice = parseFloat(price) || 0;

            if(exists) {
                exists.quantity++;
            } else {
                cart.push({ id, title, imageUrl: img, price: numPrice, quantity: 1 });
            }
            
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            updateCartUI();
            showToast("ব্যাগ এ যুক্ত হয়েছে!");
        };

        window.changeCartQty = (id, amount) => {
            let cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            let item = cart.find(i => i.id === id);
            
            if(item) {
                item.quantity += amount;
                if(item.quantity < 1) item.quantity = 1;
                localStorage.setItem('shoppingCart', JSON.stringify(cart));
                updateCartUI();
            }
        };

        window.removeFromCart = (id) => {
            let cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            updateCartUI();
            showToast("প্রোডাক্ট রিমুভ করা হয়েছে!");
        };

        function updateCartUI() {
            const cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            const list = document.getElementById('cart-items-list');
            const badges = document.querySelectorAll('.cart-total-qty');
            
            let totalQty = 0;
            let totalAmt = 0;

            if(cart.length === 0) {
                badges.forEach(b => b.textContent = 0);
                list.innerHTML = `<div style="text-align:center; padding:50px 0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;"><svg style="width:48px; color:var(--text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><p style="opacity:0.6; font-size: 14px; font-weight:500;">আপনার শপিং ব্যাগটি খালি</p></div>`;
                document.getElementById('cart-grand-total').textContent = '৳ 0';
                return;
            }

            list.innerHTML = '';
            cart.forEach(item => {
                const qty = parseInt(item.quantity) || 1;
                const price = parseFloat(item.price) || 0;
                
                totalQty += qty;
                totalAmt += (price * qty);

                list.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.imageUrl}" style="width:65px; height:65px; border-radius:10px; object-fit:cover; border:1px solid rgba(0,0,0,0.05); background:#fff;">
                        <div style="flex-grow:1; display:flex; flex-direction:column; gap:6px;">
                            
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <div style="font-size:13px; font-weight:600; line-height:1.3; padding-right:10px; color:var(--text);">${item.title}</div>
                                <button onclick="removeFromCart('${item.id}')" style="background:none; border:none; color:var(--accent); cursor:pointer; padding:2px;">
                                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                            
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
                                <div style="color:var(--primary); font-weight:700; font-family:'Poppins', sans-serif; font-size:14px;">৳${price}</div>
                                
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="changeCartQty('${item.id}', -1)">-</button>
                                    <span class="qty-text">${qty}</span>
                                    <button class="qty-btn" onclick="changeCartQty('${item.id}', 1)">+</button>
                                </div>
                            </div>

                        </div>
                    </div>`;
            });
            
            badges.forEach(b => b.textContent = totalQty);
            document.getElementById('cart-grand-total').textContent = `৳ ${Math.round(totalAmt)}`;
        }

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.textContent = msg; 
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        };

        // System Core Initialization
        updateCartUI();
        window.updateCartUI = updateCartUI;
    </script>
</body>
</html>
