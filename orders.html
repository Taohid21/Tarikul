<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Perfume Heaven</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f4c3a;
            --secondary-color: #2d3748;
            --accent-color: #e94560;
            --success-color: #10b981;
            --pending-color: #f59e0b;
            --danger-color: #ef4444;
            --confirmed-color: #3b82f6; 
            --background-color: #f6f9fc;
            --card-bg: #ffffff;
            --border-color: #e3e9ef;
            --font-family-bn: 'Hind Siliguri', sans-serif;
            --font-family-en: 'Poppins', sans-serif;
            --shadow: 0 4px 15px rgba(0,0,0,0.04);
        }
        body {
            font-family: var(--font-family-bn), var(--font-family-en);
            background-color: var(--background-color); margin: 0;
            color: var(--secondary-color);
        }
        .page-wrapper { max-width: 900px; margin: 0 auto; padding: 20px 15px; padding-bottom: 80px;}

        /* Modern Header */
        .page-header {
            background-color: var(--card-bg);
            padding: 20px; border-radius: 12px;
            box-shadow: var(--shadow); margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border-color);
        }
        .page-header h1 {
            color: var(--primary-color); font-size: 1.5rem; margin: 0;
            font-family: var(--font-family-en); font-weight: 700;
        }
        .page-header .back-link {
            text-decoration: none; background-color: #f0f2f5;
            color: var(--secondary-color); font-weight: 600; font-size: 13px;
            padding: 8px 16px; border-radius: 8px; transition: all 0.3s;
        }
        .page-header .back-link:hover { background-color: #e3e9ef; }

        /* Accordion Order Card */
        .order-card-accordion {
            background-color: var(--card-bg);
            border-radius: 12px; margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .order-summary-header {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; align-items: center;
            padding: 15px 20px; cursor: pointer; background: #fff;
        }
        @media (min-width: 768px) { .order-summary-header { grid-template-columns: 1fr 1fr 1fr auto; } }
        
        .summary-item { font-size: 0.95rem; }
        .summary-item strong {
            display: block; color: #7d879c;
            font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; text-transform: uppercase;
        }
        .order-status {
            padding: 6px 12px; border-radius: 6px;
            font-weight: 700; text-align: center; color: white;
            font-size: 0.75rem; letter-spacing: 0.5px;
            font-family: var(--font-family-en); text-transform: uppercase;
        }
        .status-pending { background-color: var(--pending-color); }
        .status-shipped { background-color: var(--confirmed-color); }
        .status-delivered { background-color: var(--success-color); }
        .status-cancelled { background-color: var(--danger-color); }
        .status-confirmed { background-color: var(--success-color); }

        .details-toggle-icon {
            width: 24px; height: 24px;
            transition: transform 0.3s ease;
            justify-self: end; color: #7d879c;
        }
        .order-card-accordion.open .details-toggle-icon { transform: rotate(180deg); color: var(--primary-color); }

        /* Collapsible Details Panel */
        .order-details-panel {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease-in-out;
            background: #fcfdfd;
        }
        .order-card-accordion.open .order-details-panel { border-top: 1px solid var(--border-color); }
        .order-details-content { padding: 20px; }
        
        .details-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .details-grid { grid-template-columns: 1fr 1fr; } }
        
        .details-section { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); }
        .details-section h3 {
            font-size: 1.1rem; margin-top: 0; margin-bottom: 15px;
            color: var(--primary-color); font-weight: 700;
            border-bottom: 1px dashed var(--border-color); padding-bottom: 8px;
        }

        /* Product List in Details */
        .product-list-item { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
        .product-list-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .product-list-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid #eee; }
        .product-list-item-info p { margin: 0; line-height: 1.4; }
        .product-list-item-info .title { font-weight: 600; font-size: 14px; color: var(--secondary-color); }
        .product-list-item-info .variant { font-size: 12px; color: #7d879c; }

        /* Info List (Shipping, Payment) */
        .info-list p { display: flex; justify-content: space-between; margin: 8px 0; font-size: 13px; }
        .info-list p span:first-child { font-weight: 600; color: #7d879c; }
        .info-list p span:last-child { font-weight: 600; text-align: right; color: var(--secondary-color); }
        
        #loading, #no-orders { text-align: center; padding: 50px 20px; font-size: 1rem; color: #7d879c; font-weight: 600; background: #fff; border-radius: 12px; border: 1px solid var(--border-color);}
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="page-header">
            <h1>My Orders</h1>
            <a href="index.html" class="back-link">হোমপেজ</a>
        </div>
        <div id="orders-list">
            <p id="loading">অর্ডার লোড হচ্ছে...</p>
            <p id="no-orders" style="display:none;">আপনি এখনও কোনো অর্ডার করেননি।</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, query, orderByChild, equalTo, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb8YsPMOY53GxiycCL6G0MPZdgWe3nnyY",
            authDomain: "movie-92659.firebaseapp.com",
            databaseURL: "https://movie-92659-default-rtdb.firebaseio.com",
            projectId: "movie-92659",
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const ordersListContainer = document.getElementById('orders-list');
        const loadingEl = document.getElementById('loading');
        const noOrdersEl = document.getElementById('no-orders');

        onAuthStateChanged(auth, user => {
            if (user) {
                fetchUserOrders(user.uid);
            } else {
                window.location.href = 'account.html';
            }
        });

        function fetchUserOrders(userId) {
            const ordersRef = ref(db, 'orders');
            const userOrdersQuery = query(ordersRef, orderByChild('userId'), equalTo(userId));

            onValue(userOrdersQuery, (snapshot) => {
                loadingEl.style.display = 'none';
                ordersListContainer.innerHTML = ''; 
                
                if (snapshot.exists()) {
                    const orders = snapshot.val();
                    // Date sorting fix (Checks order.date, orderDate or orderTimestamp)
                    const sortedOrderIds = Object.keys(orders).sort((a,b) => {
                        const dateA = new Date(orders[a].date || orders[a].orderDate || orders[a].orderTimestamp || 0);
                        const dateB = new Date(orders[b].date || orders[b].orderDate || orders[b].orderTimestamp || 0);
                        return dateB - dateA;
                    });
                    
                    sortedOrderIds.forEach(orderId => {
                        const order = orders[orderId];
                        ordersListContainer.appendChild(createOrderCard(orderId, order));
                    });
                } else {
                    noOrdersEl.style.display = 'block';
                }
            });
        }

        function createOrderCard(orderId, order) {
            const card = document.createElement('div');
            card.className = 'order-card-accordion';
            
            // --- Syncing with Admin Panel Data Structure ---
            const displayId = order.customId || order.publicId || orderId.slice(-5).toUpperCase();
            
            const cust = order.customer || order.customerInfo || {};
            const dist = cust.district || cust.division || '';
            
            const fin = order.financials || { subtotal: order.subtotal, deliveryCharge: order.shippingCost || order.deliveryCharge, total: order.totalAmount };
            const pay = order.paymentInfo || {};
            
            const totalAdvance = fin.advancePaid !== undefined ? fin.advancePaid : (pay.amountPaid || 0);
            const dueAmt = fin.dueAmount !== undefined ? fin.dueAmount : ((fin.total || 0) - totalAdvance);

            const orderDateStr = order.date || order.orderDate || order.orderTimestamp || Date.now();
            const orderDateFormatted = new Date(orderDateStr).toLocaleDateString('en-GB'); // DD/MM/YYYY

            // --- Normalize Items Array ---
            let orderItems = [];
            if (order.items && Array.isArray(order.items)) {
                orderItems = order.items; 
            } else if (order.items && typeof order.items === 'object') {
                orderItems = Object.values(order.items); 
            } else if (order.product) {
                orderItems = [order.product]; 
            }

            // --- Status Logic ---
            let displayStatus = 'Pending';
            let statusClass = 'status-pending';
            const rawStatus = (order.status || 'Pending').toLowerCase().trim();

            const capitalize = (s) => s && s.charAt(0).toUpperCase() + s.slice(1) || "";

            switch (rawStatus) {
                case 'pending': displayStatus = 'Pending'; statusClass = 'status-pending'; break;
                case 'confirmed': displayStatus = 'Confirmed'; statusClass = 'status-confirmed'; break;
                case 'shipped': displayStatus = 'Shipped'; statusClass = 'status-shipped'; break;
                case 'delivered': displayStatus = 'Delivered'; statusClass = 'status-delivered'; break;
                case 'cancelled': case 'canceled': case 'cancel': displayStatus = 'Cancelled'; statusClass = 'status-cancelled'; break;
                default: displayStatus = capitalize(order.status); statusClass = 'status-pending'; break;
            }

            // --- Product HTML ---
            const productsHtml = orderItems.length > 0 ? orderItems.map(item => {
                const title = item.title || 'Unnamed Product';
                const variantName = typeof item.variant === 'object' ? (item.variant?.name || 'Standard') : (item.variant || 'Standard');
                const qty = item.quantity || item.qty || 1;
                const img = item.imageUrl || 'https://i.postimg.cc/cCKd21YV/FB-IMG-1751915283498-prev-ui.png'; // Fallback logo
                
                return `
                <div class="product-list-item">
                    <img src="${img}" alt="Product">
                    <div class="product-list-item-info">
                        <p class="title">${title}</p>
                        <p class="variant">${variantName} × ${qty}</p>
                    </div>
                </div>`;
            }).join('') : '<p style="color:red; font-size:12px;">No items found (ডেটা ফরম্যাট এরর).</p>';

            card.innerHTML = `
                <div class="order-summary-header">
                    <div class="summary-item"><strong>Order ID</strong> #${displayId}</div>
                    <div class="summary-item"><strong>Date</strong> ${orderDateFormatted}</div>
                    <div class="summary-item"><strong>Total</strong> ৳${fin.total || 0}</div>
                    <div class="summary-item" style="display:flex; justify-content: space-between; align-items: center;">
                        <span class="order-status ${statusClass}">${displayStatus}</span>
                        <svg class="details-toggle-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
                    </div>
                </div>
                <div class="order-details-panel">
                    <div class="order-details-content">
                        <div class="details-grid">
                            <div class="details-section">
                                <h3>📦 অর্ডারকৃত পণ্য</h3>
                                ${productsHtml}
                            </div>
                            <div class="details-section">
                                <h3>🚚 ডেলিভারি তথ্য</h3>
                                <div class="info-list">
                                    <p><span>নাম:</span> <span>${cust.name || 'N/A'}</span></p>
                                    <p><span>ফোন:</span> <span>${cust.phone || 'N/A'}</span></p>
                                    <p><span>ঠিকানা:</span> <span style="text-align:right;">${cust.address || ''}, ${dist}</span></p>
                                </div>
                            </div>
                            <div class="details-section" style="grid-column: 1 / -1; background: #fff7ed; border-color: #ffedd5;">
                                <h3 style="color: #c2410c; border-bottom-color: #ffedd5;">💳 পেমেন্ট ও বিলিং</h3>
                                <div class="info-list">
                                    <p><span>পেমেন্ট মাধ্যম:</span> <span>${pay.type === 'cod' ? 'Cash on Delivery' : (pay.method || 'N/A')}</span></p>
                                    ${(pay.trxId && pay.trxId !== 'N/A') || pay.transactionId ? `<p><span>TrxID:</span> <span>${pay.trxId || pay.transactionId}</span></p>` : ''}
                                    <div style="border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 10px;">
                                        <p><span>সাবটোটাল:</span> <span>৳${fin.subtotal || 0}</span></p>
                                        <p><span>ডেলিভারি চার্জ:</span> <span>৳${fin.deliveryCharge || 0}</span></p>
                                        <p style="font-size: 15px; color: var(--primary-color);"><span>সর্বমোট:</span> <span>৳${fin.total || 0}</span></p>
                                        <p style="color: var(--success-color);"><span>অগ্রিম প্রদান:</span> <span>৳${totalAdvance}</span></p>
                                        <p style="color: var(--danger-color); font-size: 14px;"><span>ডেলিভারি ম্যানকে দিতে হবে:</span> <span>৳${dueAmt}</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Accordion toggle logic
            const header = card.querySelector('.order-summary-header');
            header.addEventListener('click', () => {
                const panel = card.querySelector('.order-details-panel');
                card.classList.toggle('open');
                if (card.classList.contains('open')) {
                    panel.style.maxHeight = panel.scrollHeight + "px";
                } else {
                    panel.style.maxHeight = null;
                }
            });

            return card;
        }
    </script>
</body>
</html>
